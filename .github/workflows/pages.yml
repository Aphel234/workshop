name: GitHub Pages bereitstellen

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6
      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Abhängigkeiten installieren
        run: npm ci
      - name: Tests ausführen
        run: npm test
      - name: Website bauen
        run: npm run build
      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5
      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
